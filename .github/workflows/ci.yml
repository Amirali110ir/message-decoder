name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  api-tests:
    name: API tests + deterministic quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite
        # Includes the deterministic rubric gate: every golden example must
        # clear the copy-readiness bar (test_golden_examples_pass_deterministic_quality_bar).
        # This catches bad exemplars without needing any AI API key.
        run: pytest -q
